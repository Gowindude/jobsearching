name: Update Tracker

on:
  schedule:
    # Run daily at 08:00 UTC (4 AM ET / 1 AM PT) — catch overnight postings
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit tracker.csv back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tracker monitor
        run: python scripts/monitor.py

      - name: Commit updated tracker if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker.csv
          if git diff --cached --quiet; then
            echo "No new roles found — tracker.csv unchanged."
          else
            NEW_COUNT=$(git diff --cached -- tracker.csv | grep '^+' | grep -v '^+++' | wc -l)
            git commit -m "chore: update tracker — ${NEW_COUNT} new aerospace/sim roles"
            git push
            echo "Committed and pushed ${NEW_COUNT} new rows."
          fi
